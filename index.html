<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria Imersiva 360° | VR Mode</title>
  <!-- Bibliotecas Core -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── CONFIGURAÇÃO DO BOTÃO VR (CRUCIAL) ── */
    /* Posiciona o botão acima da interface de seleção de fotos */
    .a-enter-vr {
      z-index: 10000 !important;
      bottom: 140px !important; 
      right: 20px !important;
      display: block !important;
    }
    .a-enter-vr-button {
      background-color: rgba(0, 210, 255, 0.8) !important;
      border-radius: 8px !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important;
    }

    /* UI Overlay */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Cabeçalho */
    #header {
      padding: 20px 30px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header-info h1 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #scene-counter {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      padding: 8px 18px;
      border-radius: 30px;
      color: #00d2ff;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid rgba(0, 210, 255, 0.3);
    }

    /* Seletor de Cenas Inferior */
    #scene-selector {
      background: linear-gradient(to top, rgba(0,0,0,0.9) 30%, transparent 100%);
      padding: 20px 0 40px;
      pointer-events: all;
    }
    
    #cards-container {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 30px;
      scrollbar-width: none; 
      max-width: 1400px;
      margin: 0 auto;
      -webkit-overflow-scrolling: touch;
    }
    
    #cards-container::-webkit-scrollbar {
      display: none;
    }

    .scene-card {
      flex: 0 0 auto;
      width: 65px;
      height: 65px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .scene-card span {
      color: #fff;
      font-weight: 500;
      font-size: 1.1rem;
    }

    .scene-card:hover {
      border-color: #00d2ff;
      transform: scale(1.1);
      background: rgba(0, 210, 255, 0.1);
    }

    .scene-card.active {
      border-color: #00d2ff;
      background: #00d2ff;
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
    }
    
    .scene-card.active span {
      color: #000;
      font-weight: 700;
    }

    /* Carregamento */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 210, 255, 0.1);
      border-top-color: #00d2ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #flash {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 99;
      transition: opacity 0.3s ease;
    }
    #flash.active { opacity: 1; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p style="color: #00d2ff; margin-top: 25px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;">Acessando Experiência 360°...</p>
</div>

<div id="flash"></div>

<!-- vr-mode-ui habilita o botão de VR no canto inferior direito -->
<a-scene id="main-scene" 
         vr-mode-ui="enabled: true" 
         embedded 
         style="position:fixed; inset:0;" 
         renderer="antialias: true; colorManagement: true;">
  
  <a-assets id="assets-manager">
    <!-- Imagens carregadas dinamicamente -->
  </a-assets>

  <!-- Skybox com rotação automática suave que pausa ao interagir -->
  <a-sky id="skybox" 
         src="" 
         rotation="0 -90 0" 
         animation="property: rotation; to: 0 270 0; dur: 120000; easing: linear; loop: true; pauseEvents: mousedown; resumeEvents: mouseup">
  </a-sky>

  <a-camera look-controls="reverseMouseDrag: false; touchEnabled: true" wasd-controls="enabled: false">
    <!-- Cursor para interação quando estiver em modo VR -->
    <a-entity cursor="fuse: true; fuseTimeout: 1500"
              position="0 0 -1"
              geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
              material="color: #00d2ff; shader: flat; opacity: 0.5"
              raycaster="objects: .clickable">
    </a-entity>
  </a-camera>
</a-scene>

<div id="ui">
  <div id="header">
    <div id="header-info">
      <h1>Imersão VR</h1>
    </div>
    <div id="scene-counter">Foto 1 / 48</div>
  </div>

  <div id="scene-selector">
    <div id="cards-container">
      <!-- Botões gerados via JS -->
    </div>
  </div>
</div>

<script>
  const totalImages = 48;
  const imagePath = './assets/images/'; 
  
  const container = document.getElementById('cards-container');
  const skybox = document.getElementById('skybox');
  const counter = document.getElementById('scene-counter');
  const flash = document.getElementById('flash');
  const loading = document.getElementById('loading');
  
  let currentScene = 1;
  let isTransitioning = false;

  function initGallery() {
    for (let i = 1; i <= totalImages; i++) {
      const card = document.createElement('div');
      card.className = `scene-card ${i === 1 ? 'active' : ''}`;
      card.dataset.id = i;
      card.innerHTML = `<span>${i}</span>`;
      card.onclick = () => switchScene(i);
      container.appendChild(card);
    }
  }

  function switchScene(id) {
    if (id === currentScene || isTransitioning) return;
    
    isTransitioning = true;
    currentScene = id;
    flash.classList.add('active');

    setTimeout(() => {
      // Caminho relativo para GitHub Pages
      const newImgUrl = `${imagePath}${id}.jpg`;
      skybox.setAttribute('src', newImgUrl);
      
      counter.textContent = `Foto ${id} / ${totalImages}`;
      
      document.querySelectorAll('.scene-card').forEach(c => {
        c.classList.toggle('active', parseInt(c.dataset.id) === id);
      });

      const activeBtn = document.querySelector('.scene-card.active');
      activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

      setTimeout(() => {
        flash.classList.remove('active');
        isTransitioning = false;
      }, 300);
    }, 300);
  }

  window.onload = () => {
    initGallery();
    skybox.setAttribute('src', `${imagePath}1.jpg`);

    document.querySelector('a-scene').addEventListener('loaded', () => {
      setTimeout(() => {
        loading.classList.add('hidden');
      }, 1000);
    });
  };
</script>

</body>
</html>
